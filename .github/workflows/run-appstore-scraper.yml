name: Update App Store Reviews
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # každý deň o 05:00 UTC (~6:00 CET)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run App Store scraper
        run: node extract-with-segmentation.js
      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage both the main file and backup to avoid unstaged changes error
          git add vodafone-appstore-reviews.json
          git add "vodafone-appstore-reviews (copy).json" || true
          git diff --cached --quiet && echo "No changes, skipping" && exit 0
          git commit -m "chore: update App Store reviews"
          git push origin main
